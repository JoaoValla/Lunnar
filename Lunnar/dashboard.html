<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acelo | Dashboard Global</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            canvas: '#FDFDF5', dark: '#121212', darkSurface: '#1E1E1E',
                            navy: '#102C57', slate: '#1A1A1A', royal: '#2563EB'
                        }
                    },
                    fontFamily: {
                        heading: ['"Instrument Sans"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        .input-field {
            width: 100%; padding: 0.875rem 1rem; border-radius: 0.75rem;
            border: 1px solid rgba(0,0,0,0.1); outline: none; transition: 0.2s;
        }
        .dark .input-field { background: #1A1A1A; border-color: rgba(255,255,255,0.1); color: white; }
        .input-field:focus { border-color: #102C57; box-shadow: 0 0 0 3px rgba(16,44,87,0.1); }
        .btn-royal { background: #2563EB; color: white; transition: 0.2s; }
        .btn-royal:hover { background: #1D4ED8; transform: translateY(-1px); }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .badge-pulse { animation: pulseRing 1.5s ease-out infinite; }
        @keyframes toastSlideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastSlideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); } }
        .toast-enter { animation: toastSlideIn 0.4s ease-out forwards; }
        .toast-exit { animation: toastSlideOut 0.3s ease-in forwards; }
    </style>

    <!-- React, ReactDOM, Babel, Recharts, Lucide -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-brand-canvas text-brand-slate dark:bg-brand-dark dark:text-gray-100 h-screen overflow-hidden flex">
    <div id="root" class="w-full h-full flex"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const supabaseUrl = 'https://tslvpvamvwexzyiyoobx.supabase.co';
        const supabaseKey = 'sb_publishable_NoErqD-ZmgszMs1HmZPYqA_ucJ-H78l';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const Icon = ({ name, className }) => {
            const ref = React.useRef(null);
            React.useEffect(() => {
                if(ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    if(window.lucide) window.lucide.createIcons({ root: ref.current });
                }
            }, [name, className]);
            return <span ref={ref} style={{display: 'contents'}}></span>;
        };


        const AIAgentConfig = ({ userId }) => {
            const [config, setConfig] = useState({ name: 'Acelo Bot', tone: 'amigavel', prompt: 'Você é um assistente virtual...' });
            const [saved, setSaved] = useState(false);
            const [saving, setSaving] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!userId) return;
                loadConfig();
            }, [userId]);

            const loadConfig = async () => {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('agent_config')
                    .select('*')
                    .eq('user_id', userId)
                    .single();
                
                if (data) {
                    setConfig({
                        name: data.agent_name || '',
                        tone: data.tone || 'amigavel',
                        prompt: data.system_prompt || ''
                    });
                }
                setLoading(false);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                
                const { data: existing } = await supabaseClient
                    .from('agent_config')
                    .select('id')
                    .eq('user_id', userId)
                    .single();

                if (existing) {
                    await supabaseClient
                        .from('agent_config')
                        .update({
                            agent_name: config.name,
                            tone: config.tone,
                            system_prompt: config.prompt,
                            updated_at: new Date().toISOString()
                        })
                        .eq('user_id', userId);
                } else {
                    await supabaseClient
                        .from('agent_config')
                        .insert([{
                            user_id: userId,
                            agent_name: config.name,
                            tone: config.tone,
                            system_prompt: config.prompt
                        }]);
                }
                
                setSaving(false);
                setSaved(true);
                setTimeout(() => setSaved(false), 3000);
            };

            return (
                <div className="animate-fade h-full max-w-2xl mx-auto w-full">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="font-heading font-bold text-3xl mb-1 flex items-center gap-2">
                                <Icon name="bot" className="w-8 h-8 text-brand-navy dark:text-blue-400" /> Agente Acelo IA
                            </h2>
                            <p className="text-sm text-gray-500">Personalize o comportamento do seu assistente virtual.</p>
                        </div>
                    </div>
                    
                    <div className="bg-white dark:bg-brand-darkSurface rounded-2xl shadow-soft dark:shadow-dark-soft border border-black/5 dark:border-white/5 overflow-hidden relative">
                        {loading && (
                            <div className="absolute inset-0 z-10 bg-white/80 dark:bg-brand-darkSurface/80 backdrop-blur-sm flex items-center justify-center">
                                <div className="flex flex-col items-center">
                                    <div className="w-8 h-8 border-2 border-brand-navy border-t-transparent rounded-full animate-spin mb-3"></div>
                                    <span className="text-sm text-gray-500 font-medium">Carregando configurações...</span>
                                </div>
                            </div>
                        )}
                        <form onSubmit={handleSubmit}>
                            <div className="p-8 space-y-6">
                                <div className="grid grid-cols-2 gap-6">
                                    <div>
                                        <label className="block text-sm font-semibold mb-2">Nome do Agente</label>
                                        <div className="relative">
                                            <Icon name="tag" className="absolute left-3 top-3 w-4 h-4 text-gray-400" />
                                            <input type="text" className="input-field pl-10" value={config.name} onChange={e => setConfig({...config, name: e.target.value})} required disabled={loading} />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold mb-2">Tom de Voz</label>
                                        <div className="relative">
                                            <Icon name="mic" className="absolute left-3 top-3 w-4 h-4 text-gray-400" />
                                            <select className="input-field pl-10 appearance-none cursor-pointer" value={config.tone} onChange={e => setConfig({...config, tone: e.target.value})} disabled={loading}>
                                                <option value="amigavel">Amigável e Empático</option>
                                                <option value="profissional">Profissional e Formal</option>
                                                <option value="consultivo">Consultivo e Especialista</option>
                                                <option value="direto">Direto e Objetivo</option>
                                            </select>
                                            <Icon name="chevron-down" className="absolute right-3 top-3.5 w-4 h-4 text-gray-400 pointer-events-none" />
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-2">Prompt Mãe (Instruções Base)</label>
                                    <p className="text-xs text-brand-slate/60 dark:text-gray-400 mb-3">Defina as regras principais de como a IA deve responder e o que ela pode ou não fazer.</p>
                                    <textarea 
                                        className="input-field resize-none h-64 font-mono text-xs leading-relaxed" 
                                        value={config.prompt} onChange={e => setConfig({...config, prompt: e.target.value})}
                                        required
                                        disabled={loading}
                                    ></textarea>
                                </div>
                            </div>

                            <div className="bg-gray-50 dark:bg-[#1A1A1A] px-8 py-5 border-t border-black/5 dark:border-white/5 flex justify-between items-center">
                                <div className="text-sm w-3/4">
                                    {saved ? <span className="text-green-600 font-medium flex items-center gap-1"><Icon name="check-circle" className="w-4 h-4" /> Configurações salvas no Supabase!</span> : <span className="text-gray-400">As configurações serão enviadas para o seu banco de dados e lidas pelo n8n.</span>}
                                </div>
                                <button type="submit" disabled={saving || loading} className="btn-royal px-6 py-3 rounded-xl font-bold text-sm shadow-md flex items-center gap-2 disabled:opacity-60 whitespace-nowrap">
                                    {saving ? (<><div className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>Salvando...</>) : (<><Icon name="save" className="w-4 h-4" /> Salvar Configurações</>)}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE 4.5: AGENDAMENTOS ---
        const AppointmentsDashboard = ({ userId }) => {
            const [appointments, setAppointments] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!userId) return;
                loadAppointments();
            }, [userId]);

            const loadAppointments = async () => {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('appointments')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (!error) setAppointments(data || []);
                setLoading(false);
            };

            const formatDateTime = (dateStr) => {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return new Intl.DateTimeFormat('pt-BR', {
                    weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
                }).format(date);
            };

            const updateStatus = async (id, newStatus) => {
                await supabaseClient.from('appointments').update({ status: newStatus }).eq('id', id);
                loadAppointments();
            };

            const deleteAppointment = async (id, clientName) => {
                if (!window.confirm(`Tem certeza que deseja deletar o agendamento de "${clientName || 'Sem nome'}"?\n\nEssa ação não pode ser desfeita.`)) return;
                await supabaseClient.from('appointments').delete().eq('id', id);
                loadAppointments();
            };

            const statusColors = {
                pendente: 'bg-orange-100 text-orange-700 dark:bg-orange-500/20 dark:text-orange-400',
                confirmado: 'bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400',
                concluido: 'bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-300',
                cancelado: 'bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-400',
                expirado: 'bg-gray-100 text-gray-600 dark:bg-gray-500/20 dark:text-gray-400',
            };

            return (
                <div className="animate-fade h-full max-w-5xl mx-auto w-full flex flex-col">
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="font-heading font-bold text-3xl mb-1 flex items-center gap-2">
                                <Icon name="calendar" className="w-8 h-8 text-brand-navy dark:text-blue-400" /> Agendamentos
                            </h2>
                            <p className="text-sm text-gray-500">Gerencie os horários marcados pela inteligência artificial.</p>
                        </div>
                        <button onClick={loadAppointments} className="flex items-center gap-2 bg-white dark:bg-brand-darkSurface border border-black/10 dark:border-white/10 px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-black/5 dark:hover:bg-white/5 transition-colors shadow-sm">
                            <Icon name="refresh-cw" className="w-4 h-4" /> Atualizar
                        </button>
                    </div>

                    <div className="bg-white dark:bg-brand-darkSurface rounded-2xl shadow-soft dark:shadow-dark-soft border border-black/5 dark:border-white/5 overflow-hidden flex-1">
                        {loading ? (
                            <div className="flex h-full flex-col items-center justify-center text-gray-400 p-12">
                                <div className="w-8 h-8 border-2 border-brand-navy border-t-transparent rounded-full animate-spin mb-3"></div>
                                <p className="text-sm">Carregando agendamentos...</p>
                            </div>
                        ) : appointments.length === 0 ? (
                            <div className="flex h-full flex-col items-center justify-center text-gray-400 p-12 bg-black/[0.02] dark:bg-white/[0.02]">
                                <Icon name="calendar-off" className="w-12 h-12 mb-2 opacity-50" />
                                <p className="font-medium text-sm">Nenhum agendamento encontrado.</p>
                                <p className="text-xs mt-1">Os agendamentos serão marcados pela IA no WhatsApp.</p>
                            </div>
                        ) : (
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-50 dark:bg-[#1A1A1A] text-gray-500 text-xs uppercase tracking-wider border-b border-black/5 dark:border-white/5">
                                        <th className="px-6 py-4 font-semibold">Cliente</th>
                                        <th className="px-6 py-4 font-semibold">Contato</th>
                                        <th className="px-6 py-4 font-semibold">Data e Hora</th>
                                        <th className="px-6 py-4 font-semibold">Status</th>
                                        <th className="px-6 py-4 font-semibold text-right">Ação</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {appointments.map(app => (
                                        <tr key={app.id} className="border-b border-black/5 dark:border-white/5 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                                            <td className="px-6 py-4 font-medium flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full bg-brand-navy/10 dark:bg-blue-400/10 flex items-center justify-center text-brand-navy dark:text-blue-400 uppercase font-bold text-xs">
                                                    {app.client_name ? app.client_name.substring(0,2) : '??'}
                                                </div>
                                                {app.client_name || 'Sem nome'}
                                            </td>
                                            <td className="px-6 py-4 text-sm text-gray-500 font-mono">
                                                {app.client_phone || '—'}
                                            </td>
                                            <td className="px-6 py-4 text-sm font-medium">
                                                {formatDateTime(app.appointment_date)}
                                            </td>
                                            <td className="px-6 py-4">
                                                <span className={`text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider flex w-max items-center justify-center gap-1 ${statusColors[app.status] || statusColors.pendente}`}>
                                                    {app.status === 'pendente' && <span className="w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse"></span>}
                                                    {app.status === 'expirado' && <Icon name="clock" className="w-3 h-3" />}
                                                    {app.status}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 text-right">
                                                <div className="flex gap-2 justify-end">
                                                    {app.status === 'pendente' && (
                                                        <button onClick={() => updateStatus(app.id, 'confirmado')} className="bg-brand-navy hover:bg-[#163a70] text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-colors shadow-sm inline-flex items-center gap-1.5">
                                                            <Icon name="check" className="w-3.5 h-3.5" /> Confirmar
                                                        </button>
                                                    )}
                                                    {app.status !== 'concluido' && app.status !== 'cancelado' && app.status !== 'expirado' && (
                                                        <button onClick={() => updateStatus(app.id, 'cancelado')} className="bg-white hover:bg-red-50 text-red-600 border border-gray-200 hover:border-red-200 dark:bg-transparent dark:border-white/10 dark:hover:bg-red-500/10 dark:hover:border-red-500/30 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors shadow-sm inline-flex items-center gap-1.5">
                                                            <Icon name="x" className="w-3.5 h-3.5" /> Cancelar
                                                        </button>
                                                    )}
                                                    <button onClick={() => deleteAppointment(app.id, app.client_name)} className="bg-white hover:bg-red-50 text-red-500 border border-gray-200 hover:border-red-300 dark:bg-transparent dark:border-white/10 dark:hover:bg-red-500/10 dark:hover:border-red-500/30 text-xs font-bold px-2.5 py-1.5 rounded-lg transition-colors shadow-sm inline-flex items-center gap-1" title="Deletar agendamento">
                                                        <Icon name="trash-2" className="w-3.5 h-3.5" />
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE: TOAST SYSTEM ---
        const ToastContainer = ({ toasts, removeToast }) => {
            return (
                <div className="fixed top-6 right-6 z-[9999] flex flex-col gap-3 max-w-md" style={{pointerEvents: 'none'}}>
                    {toasts.map(t => (
                        <div key={t.id} className={`${t.exiting ? 'toast-exit' : 'toast-enter'} bg-white dark:bg-brand-darkSurface border border-red-200 dark:border-red-500/30 rounded-2xl shadow-2xl p-4 flex items-start gap-3`} style={{pointerEvents: 'auto'}}>
                            <div className="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center flex-shrink-0 text-xl">🚨</div>
                            <div className="flex-1 min-w-0">
                                <p className="font-bold text-sm text-red-600 dark:text-red-400">Novo atendimento humano</p>
                                <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5 truncate">{t.message}</p>
                            </div>
                            <button onClick={() => removeToast(t.id)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 flex-shrink-0 mt-0.5" style={{pointerEvents: 'auto'}}>
                                <Icon name="x" className="w-4 h-4" />
                            </button>
                        </div>
                    ))}
                </div>
            );
        };

        // --- COMPONENTE: ATENDIMENTOS PARA ASSUMIR ---
        const EscalationsDashboard = ({ userId, onOpenChat }) => {
            const [escalations, setEscalations] = useState([]);
            const [loading, setLoading] = useState(true);
            const [actionLoading, setActionLoading] = useState(null);

            const loadEscalations = useCallback(async () => {
                if (!userId) return;
                const { data, error } = await supabaseClient
                    .from('escalations')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                if (!error) setEscalations(data || []);
                setLoading(false);
            }, [userId]);

            useEffect(() => {
                loadEscalations();
            }, [loadEscalations]);

            const handleAssume = async (id) => {
                setActionLoading(id + '-assume');
                await supabaseClient.from('escalations').update({ status: 'in_progress' }).eq('id', id);
                await loadEscalations();
                setActionLoading(null);
            };

            const handleResolve = async (id) => {
                setActionLoading(id + '-resolve');
                await supabaseClient.from('escalations').update({ status: 'resolved', resolved_at: new Date().toISOString() }).eq('id', id);
                await loadEscalations();
                setActionLoading(null);
            };

            const timeAgo = (dateStr) => {
                if (!dateStr) return '';
                const diff = Date.now() - new Date(dateStr).getTime();
                const secs = Math.floor(diff / 1000);
                if (secs < 60) return `há ${secs}s`;
                const mins = Math.floor(secs / 60);
                if (mins < 60) return `há ${mins} minuto${mins > 1 ? 's' : ''}`;
                const hours = Math.floor(mins / 60);
                if (hours < 24) return `há ${hours} hora${hours > 1 ? 's' : ''}`;
                const days = Math.floor(hours / 24);
                return `há ${days} dia${days > 1 ? 's' : ''}`;
            };

            const formatPhone = (phone) => {
                if (!phone) return '—';
                const clean = phone.replace(/\D/g, '');
                if (clean.length === 13) return `+${clean.slice(0,2)} (${clean.slice(2,4)}) ${clean.slice(4,9)}-${clean.slice(9)}`;
                if (clean.length === 11) return `(${clean.slice(0,2)}) ${clean.slice(2,7)}-${clean.slice(7)}`;
                return phone;
            };

            const whatsappLink = (phone) => {
                if (!phone) return '#';
                const clean = phone.replace(/\D/g, '');
                return `https://wa.me/${clean}`;
            };

            const statusBadge = {
                pending:     { label: 'Aguardando',   color: 'bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-400',       dot: 'bg-red-500' },
                in_progress: { label: 'Em andamento', color: 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400', dot: 'bg-amber-500' },
                resolved:    { label: 'Resolvido',    color: 'bg-green-100 text-green-700 dark:bg-green-500/20 dark:text-green-300', dot: 'bg-green-500' }
            };

            const pendingCount = escalations.filter(e => e.status === 'pending').length;

            return (
                <div className="animate-fade h-full max-w-4xl mx-auto w-full flex flex-col">
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="font-heading font-bold text-3xl mb-1 flex items-center gap-2">
                                <Icon name="alert-triangle" className="w-8 h-8 text-red-500" /> Atendimentos para Assumir
                            </h2>
                            <p className="text-sm text-gray-500">Escalações que precisam de atendimento humano.</p>
                        </div>
                        <button onClick={() => { setLoading(true); loadEscalations(); }} className="flex items-center gap-2 bg-white dark:bg-brand-darkSurface border border-black/10 dark:border-white/10 px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-black/5 dark:hover:bg-white/5 transition-colors shadow-sm">
                            <Icon name="refresh-cw" className="w-4 h-4" /> Atualizar
                        </button>
                    </div>

                    {/* Contador */}
                    <div className={`mb-6 rounded-2xl border p-5 flex items-center gap-4 transition-all ${pendingCount > 0 ? 'bg-red-50 dark:bg-red-500/10 border-red-200 dark:border-red-500/20' : 'bg-green-50 dark:bg-green-500/10 border-green-200 dark:border-green-500/20'}`}>
                        <div className={`relative flex items-center justify-center ${pendingCount > 0 ? 'badge-pulse' : ''}`}>
                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-white font-heading font-bold text-2xl shadow-lg ${pendingCount > 0 ? 'bg-gradient-to-br from-red-500 to-red-600' : 'bg-gradient-to-br from-green-500 to-emerald-600'}`}>
                                {pendingCount}
                            </div>
                        </div>
                        <div>
                            <p className={`font-bold text-lg ${pendingCount > 0 ? 'text-red-700 dark:text-red-400' : 'text-green-700 dark:text-green-300'}`}>

                            <div className="space-y-4 pt-6">
                                <button 
                                    id="stripe-checkout-button"
                                    className="w-full bg-brand-navy dark:bg-blue-600 hover:bg-[#163a70] dark:hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg flex items-center justify-center gap-2"
                                >
                                    <Icon name="zap" className="w-5 h-5 fill-current" />
                                    Assinar Agora
                                </button>
                                
                                <a 
                                    href="#" 
                                    id="cancel-subscription-link"
                                    className="inline-block text-sm text-gray-400 hover:text-red-500 font-medium transition-colors border-b border-transparent hover:border-red-200"
                                >
                                    Cancelar Assinatura
                                </a>
                            </div>

                            <p className="text-xs text-gray-400 px-6 leading-relaxed">
                                Cancelamento imediato sem taxas ocultas. Seu acesso permanece até o fim do período vigente.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE 8: PIPELINE DE LEADS ---
        const LeadsPipeline = ({ userId }) => {
            const [leads, setLeads] = useState([]);
            const [loadingLeads, setLoadingLeads] = useState(true);
            const [filter, setFilter] = useState('all');

            useEffect(() => {
                if (!userId) return;
                loadLeads();
            }, [userId]);

            const loadLeads = async () => {
                setLoadingLeads(true);
                const { data, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .eq('user_id', userId)
                    .order('updated_at', { ascending: false });
                if (!error) setLeads(data || []);
                setLoadingLeads(false);
            };

            const statusConfig = {
                hot:  { label: 'Quente',  emoji: '🔥', color: 'red',    gradient: 'from-red-500 to-orange-500',   bg: 'bg-red-50 dark:bg-red-500/10',    border: 'border-red-200 dark:border-red-500/20',    badge: 'bg-red-100 text-red-700 dark:bg-red-500/20 dark:text-red-400',       headerBg: 'bg-gradient-to-r from-red-500 to-orange-500' },
                warm: { label: 'Morno',   emoji: '🟡', color: 'yellow', gradient: 'from-amber-400 to-yellow-500', bg: 'bg-amber-50 dark:bg-amber-500/10', border: 'border-amber-200 dark:border-amber-500/20', badge: 'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400', headerBg: 'bg-gradient-to-r from-amber-400 to-yellow-500' },
                cold: { label: 'Frio',    emoji: '🧊', color: 'blue',   gradient: 'from-blue-400 to-cyan-500',   bg: 'bg-blue-50 dark:bg-blue-500/10',  border: 'border-blue-200 dark:border-blue-500/20',  badge: 'bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400',    headerBg: 'bg-gradient-to-r from-blue-400 to-cyan-500' }
            };

            const counts = {
                hot:  leads.filter(l => l.status === 'hot').length,
                warm: leads.filter(l => l.status === 'warm').length,
                cold: leads.filter(l => l.status === 'cold').length,
            };

            const formatPhone = (phone) => {
                if (!phone) return '—';
                const clean = phone.replace(/\D/g, '');
                if (clean.length === 13) return `+${clean.slice(0,2)} (${clean.slice(2,4)}) ${clean.slice(4,9)}-${clean.slice(9)}`;
                if (clean.length === 11) return `(${clean.slice(0,2)}) ${clean.slice(2,7)}-${clean.slice(7)}`;
                return phone;
            };

            const timeAgo = (dateStr) => {
                if (!dateStr) return '';
                const diff = Date.now() - new Date(dateStr).getTime();
                const mins = Math.floor(diff / 60000);
                if (mins < 60) return `${mins}min atrás`;
                const hours = Math.floor(mins / 60);
                if (hours < 24) return `${hours}h atrás`;
                const days = Math.floor(hours / 24);
                return `${days}d atrás`;
            };

            const LeadCard = ({ lead }) => {
                const cfg = statusConfig[lead.status] || statusConfig.cold;
                return (
                    <div className={`bg-white dark:bg-brand-darkSurface rounded-xl border ${cfg.border} p-4 shadow-sm hover:shadow-md transition-all duration-200 group cursor-pointer hover:-translate-y-0.5`}>
                        <div className="flex items-start justify-between mb-3">
                            <div className="flex items-center gap-3">
                                <div className={`w-10 h-10 rounded-full ${cfg.bg} flex items-center justify-center text-lg font-bold`}>
                                    {lead.name ? lead.name.substring(0,2).toUpperCase() : '??'}
                                </div>
                                <div>
                                    <h4 className="font-semibold text-sm">{lead.name || 'Sem nome'}</h4>
                                    <p className="text-xs text-gray-400 font-mono">{formatPhone(lead.phone)}</p>
                                </div>
                            </div>
                            <span className={`text-lg`}>{cfg.emoji}</span>
                        </div>
                        {lead.notas && (
                            <p className="text-xs text-gray-500 dark:text-gray-400 mb-3 line-clamp-2 bg-black/[0.02] dark:bg-white/5 p-2 rounded-lg">
                                <Icon name="file-text" className="w-3 h-3 inline mr-1 opacity-50" />{lead.notas}
                            </p>
                        )}
                        <div className="flex items-center justify-between pt-2 border-t border-black/5 dark:border-white/5">
                            <div className="flex items-center gap-2">
                                {lead.ai_active ? (
                                    <span className="bg-green-100 dark:bg-green-500/20 text-green-700 dark:text-green-300 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>IA Ativa
                                    </span>
                                ) : (
                                    <span className="bg-orange-100 dark:bg-orange-500/20 text-orange-700 dark:text-orange-300 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 rounded-full bg-orange-500"></span>Atendente
                                    </span>
                                )}
                            </div>
                            <span className="text-[10px] text-gray-400">{timeAgo(lead.updated_at)}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="animate-fade h-full max-w-7xl mx-auto w-full flex flex-col">
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="font-heading font-bold text-3xl mb-1 flex items-center gap-2">
                                <Icon name="thermometer" className="w-8 h-8 text-brand-navy dark:text-blue-400" /> Pipeline de Leads
                            </h2>
                            <p className="text-sm text-gray-500">Visualize a temperatura dos seus leads em tempo real.</p>
                        </div>
                        <button onClick={loadLeads} className="flex items-center gap-2 bg-white dark:bg-brand-darkSurface border border-black/10 dark:border-white/10 px-4 py-2.5 rounded-xl text-sm font-semibold hover:bg-black/5 dark:hover:bg-white/5 transition-colors shadow-sm">
                            <Icon name="refresh-cw" className="w-4 h-4" /> Atualizar
                        </button>
                    </div>

                    {/* Resumo */}
                    <div className="grid grid-cols-3 gap-4 mb-6">
                        {Object.entries(statusConfig).map(([key, cfg]) => (
                            <div key={key} className={`relative overflow-hidden rounded-2xl border ${cfg.border} ${cfg.bg} p-5`}>
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1">{cfg.emoji} {cfg.label}</p>
                                        <p className="text-3xl font-heading font-bold">{counts[key]}</p>
                                    </div>
                                    <div className={`w-12 h-12 rounded-xl ${cfg.headerBg} flex items-center justify-center text-white text-2xl shadow-lg`}>
                                        {cfg.emoji}
                                    </div>
                                </div>
                                <div className={`absolute bottom-0 left-0 h-1 ${cfg.headerBg}`} style={{width: leads.length > 0 ? `${(counts[key]/leads.length)*100}%` : '0%'}}></div>
                            </div>
                        ))}
                    </div>

                    {/* Kanban */}
                    {loadingLeads ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-gray-400">
                            <div className="w-8 h-8 border-2 border-brand-navy border-t-transparent rounded-full animate-spin mb-3"></div>
                            <p className="text-sm">Carregando leads do Supabase...</p>
                        </div>
                    ) : leads.length === 0 ? (
                        <div className="flex-1 flex flex-col items-center justify-center text-gray-400 bg-black/5 dark:bg-white/5 rounded-2xl border border-dashed border-black/10 dark:border-white/10 p-12">
                            <Icon name="users" className="w-12 h-12 mb-2 opacity-50" />
                            <p className="font-medium text-sm">Nenhum lead encontrado.</p>
                            <p className="text-xs mt-1">Os leads serão criados automaticamente pelo WhatsApp via n8n.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-3 gap-5 flex-1 min-h-0">
                            {['hot', 'warm', 'cold'].map(status => {
                                const cfg = statusConfig[status];
                                const statusLeads = leads.filter(l => l.status === status);
                                return (
                                    <div key={status} className="flex flex-col min-h-0">
                                        <div className={`${cfg.headerBg} rounded-t-xl px-4 py-2.5 flex items-center justify-between`}>
                                            <span className="text-white font-bold text-sm flex items-center gap-2">{cfg.emoji} {cfg.label}</span>
                                            <span className="bg-white/20 text-white text-xs font-bold px-2 py-0.5 rounded-full">{statusLeads.length}</span>
                                        </div>
                                        <div className={`flex-1 overflow-y-auto ${cfg.bg} rounded-b-xl border-x border-b ${cfg.border} p-3 space-y-3`}>
                                            {statusLeads.length === 0 && (
                                                <div className="text-center text-gray-400 text-xs py-8 opacity-60">
                                                    <p>Nenhum lead {cfg.label.toLowerCase()}</p>
                                                </div>
                                            )}
                                            {statusLeads.map(lead => <LeadCard key={lead.id} lead={lead} />)}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [theme, setTheme] = useState('light');
            const [nav, setNav] = useState('leads');
            const [loading, setLoading] = useState(true);
            const [pendingEscalations, setPendingEscalations] = useState(0);
            const [toasts, setToasts] = useState([]);
            const prevPendingIdsRef = useRef(new Set());
            const toastIdRef = useRef(0);
            const [userId, setUserId] = useState(null);

            const [users, setUsers] = useState(() => {
                const saved = localStorage.getItem('@Acelo:users');
                if (saved) return JSON.parse(saved);
                return [
                    { id: 1, email: 'novo.cliente@gmail.com', date: 'Hoje, 10:30', status: 'pendente' },
                    { id: 2, email: 'empresa.x@hotmail.com', date: 'Ontem, 15:45', status: 'pendente' },
                    { id: 3, email: 'aprovado.ja@gmail.com', date: '21 Mar, 09:00', status: 'aprovado' },
                ];
            });

            useEffect(() => {
                localStorage.setItem('@Acelo:users', JSON.stringify(users));
            }, [users]);

            useEffect(() => {
                const checkAuth = async () => {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) {
                        window.location.href = 'Acelo.html';
                        return;
                    }
                    setUserId(session.user.id);
                    setLoading(false);
                };
                checkAuth();

                if(window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
            }, []);

            // Polling para escalations a cada 30s
            useEffect(() => {
                if (!userId) return;
                const fetchPending = async () => {
                    const { data, error } = await supabaseClient
                        .from('escalations')
                        .select('id, nome_cliente')
                        .eq('user_id', userId)
                        .eq('status', 'pending');
                    if (!error && data) {
                        setPendingEscalations(data.length);
                        const currentIds = new Set(data.map(d => d.id));
                        // Detectar novos registros
                        data.forEach(d => {
                            if (!prevPendingIdsRef.current.has(d.id)) {
                                const tId = ++toastIdRef.current;
                                setToasts(prev => [...prev, { id: tId, message: d.nome_cliente || 'Cliente sem nome', exiting: false }]);
                                setTimeout(() => {
                                    setToasts(prev => prev.map(t => t.id === tId ? { ...t, exiting: true } : t));
                                    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== tId)), 350);
                                }, 6000);
                            }
                        });
                        prevPendingIdsRef.current = currentIds;
                    }
                };
                fetchPending();
                const interval = setInterval(fetchPending, 30000);
                return () => clearInterval(interval);
            }, [userId]);

            useEffect(() => {
                if(!loading) {
                    if(theme === 'dark') document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                }
            }, [theme, nav, loading]);

            if (loading) return null;

            const removeToast = (id) => {
                setToasts(prev => prev.map(t => t.id === id ? { ...t, exiting: true } : t));
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 350);
            };

            const menu = [
                { id: 'leads', icon: 'thermometer', label: 'Pipeline de Leads' },
                { id: 'escalations', icon: 'bell', label: 'Atendimentos', badge: pendingEscalations },
                { id: 'appointments', icon: 'calendar', label: 'Agendamentos' },
                { id: 'agent', icon: 'bot', label: 'Configuração da IA' },
                { id: 'billing', icon: 'credit-card', label: 'Assinatura' },
                { id: 'support', icon: 'life-buoy', label: 'Suporte' },
                { id: 'settings', icon: 'settings', label: 'Configurações' },
                { id: 'admin', icon: 'shield', label: 'Área Admin' },
            ];

            return (
                <div className="flex w-full h-full">
                    {/* Sidebar */}
                    <div className="w-72 border-r border-black/5 dark:border-white/5 bg-white dark:bg-brand-darkSurface flex flex-col justify-between py-6 z-20">
                        <div>
                            <div className="px-6 mb-10 flex items-center gap-3">
                                <div className="w-8 h-8 rounded-lg bg-brand-navy flex justify-center items-center"><Icon name="moon" className="text-white w-5 h-5"/></div>
                                <span className="font-heading font-bold text-xl">Acelo</span>
                            </div>
                            <nav className="px-4 space-y-2">
                                {menu.map(i => (
                                    <button key={i.id} onClick={() => setNav(i.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-colors font-semibold text-sm relative ${nav === i.id ? 'bg-brand-navy text-white shadow-md' : 'text-brand-slate/70 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5'}`}>
                                        <Icon name={i.icon} className="w-5 h-5" />
                                        <span className="flex-1 text-left">{i.label}</span>
                                        {i.badge > 0 && (
                                            <span className={`min-w-[20px] h-5 px-1.5 rounded-full text-[10px] font-bold flex items-center justify-center ${nav === i.id ? 'bg-red-500 text-white' : 'bg-red-500 text-white badge-pulse'}`}>
                                                {i.badge}
                                            </span>
                                        )}
                                    </button>
                                ))}
                            </nav>
                        </div>
                        <div className="px-4 space-y-2">
                            <button onClick={() => setTheme(theme==='dark'?'light':'dark')} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-black/5 dark:hover:bg-white/5 text-brand-slate/70 dark:text-gray-400">
                                <span key={theme} className="flex"><Icon name={theme==='dark'?'sun':'moon'} className="w-5 h-5" /></span> {theme==='dark'?'Modo Claro':'Modo Escuro'}
                            </button>
                            <button onClick={async () => {
                                await supabaseClient.auth.signOut();
                                window.location.href = 'Acelo.html';
                            }} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors">
                                <Icon name="log-out" className="w-5 h-5" /> Sair do Painel
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-1 bg-brand-canvas dark:bg-[#121212] p-8 overflow-y-auto relative">
                        {nav === 'leads' && <LeadsPipeline userId={userId} />}
                        {nav === 'escalations' && <EscalationsDashboard userId={userId} onOpenChat={(leadId) => { /* navegar p/ chat do lead */ setNav('leads'); }} />}
                        {nav === 'appointments' && <AppointmentsDashboard userId={userId} />}
                        {nav === 'agent' && <AIAgentConfig userId={userId} />}
                        {nav === 'billing' && <BillingDashboard />}
                        {nav === 'support' && <PersonalSupport />}
                        {nav === 'settings' && <Settings userId={userId} />}
                        {nav === 'admin' && <AdminArea users={users} setUsers={setUsers} />}
                    </div>
                    <ToastContainer toasts={toasts} removeToast={removeToast} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
